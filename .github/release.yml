changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "Breaking Changes"
      labels:
        - breaking-change
    - title: "Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - regression
    - title: "Refactoring / Internal"
      labels:
        - refactor
        - chore
    - title: "Documentation"
      labels:
        - documentation
